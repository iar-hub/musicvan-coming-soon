<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>musicvan - coming soon!</title>
  <link rel="icon" type="image/png" href="assets/musicvan-favicon.png">

  <style>
    /* Full-screen layout */
    body {
      background-color: #ffffff;
      color: #ff6600;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* Logo styling */
    img {
      width: 40vw;         /* scales with viewport width */
      max-width: 600px;    /* caps size on large screens */
      height: auto;
      margin-bottom: 20px;
    }

    /* Text styling */
    h1 {
      font-size: 2rem;
      font-weight: 600;
      text-transform: lowercase;
      margin: 0;
    }

    /* Optional fade-in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    img, h1 {
      animation: fadeIn 1.2s ease-out;
    }
  </style>
</head>
<body>
  <img src="assets/musicvan-logo.png" alt="musicvan logo">
  <h1>musicvan - coming soon!</h1>
</body>
</html>
